<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f0f9ff">
    <title>Keyboard Ball 3D</title>

    <!-- Yandex Games SDK v2 -->
    <script src="https://yandex.ru/games/sdk/v2"></script>
    <!-- Three.js -->
    <script src="three.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        :root {
            --bg-light: #f0f9ff;
            --accent-cyan: #06b6d4;
            --accent-pink: #ec4899;
            --accent-gold: #f59e0b;
            --accent-ruby: #ef4444;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: #000000;
        }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background: #f0f9ff; color: var(--text-primary); touch-action: none; }
        #app { position: relative; width: 100vw; height: 100vh; }
        .hidden { display: none !important; }

        .cartoony-box {
            border: 2.5px solid var(--border) !important;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.9) !important;
            border-radius: 14px !important;
            transition: all 0.1s ease !important;
            background: #ffffff;
        }
        .cartoony-box:active {
            transform: translate(2px, 2px) !important;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.9) !important;
        }

        #topBar {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 12px 16px;
            display: flex; justify-content: space-between; align-items: flex-start;
            z-index: 30; pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        #topBar.game-active {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
        }
        .top-btn {
            pointer-events: auto; width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            background: #fff; cursor: pointer;
        }
        .top-btn svg { width: 24px; height: 24px; color: var(--text-primary); }

        .currency-container {
            pointer-events: auto; display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        }
        .currency-pill {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px; background: #fff;
            font-family: 'Rajdhani', sans-serif; font-weight: 800; font-size: 18px;
        }
        .currency-pill svg { width: 20px; height: 20px; }
        .gold-text { color: var(--accent-gold); }
        .ruby-text { color: var(--accent-ruby); }

        #bottomBar {
            position: absolute; bottom: 20px; left: 0; right: 0;
            display: flex; justify-content: center; align-items: flex-end; gap: 12px;
            padding: 0 16px; z-index: 30; pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        #bottomBar.game-active {
            opacity: 0;
            transform: translateY(30px);
            pointer-events: none;
        }
        .bottom-btn {
            pointer-events: auto;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 4px; padding: 12px 16px; min-width: 80px;
            background: #fff; cursor: pointer;
        }
        .bottom-btn svg { width: 28px; height: 28px; color: var(--text-primary); }
        .bottom-btn span { font-family: 'Rajdhani', sans-serif; font-weight: 800; font-size: 14px; letter-spacing: 1px; }
        .bottom-btn.primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: #fff; min-width: 100px; padding: 16px 24px;
        }
        .bottom-btn.primary svg { color: #fff; width: 32px; height: 32px; }
        .bottom-btn.primary span { font-size: 18px; color: #fff; }

        #tapOverlay {
            position: absolute; inset: 0; z-index: 20;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(3px);
            transition: opacity 0.3s; pointer-events: none;
        }
        #tapOverlay.hidden { opacity: 0; }
        .tap-instruction {
            font-family: 'Rajdhani', sans-serif; font-size: 36px; font-weight: 900;
            color: var(--text-primary); text-shadow: 2px 2px 0px #fff;
            animation: pulse 1.5s ease-in-out infinite;
            text-align: center;
            padding: 0 20px;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #gameHud {
            position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
            z-index: 20; pointer-events: none; width: 80%; max-width: 300px;
            transition: opacity 0.3s ease;
        }
        #progressBar {
            width: 100%; height: 10px; background: #e2e8f0;
            border: 2px solid var(--border); border-radius: 5px; overflow: hidden;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.8);
        }
        #progressFill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink)); transition: width 0.1s linear; }
        #progressLabel {
            text-align: center; font-family: 'Rajdhani', sans-serif; font-weight: 800;
            font-size: 14px; margin-top: 4px; color: var(--text-secondary);
        }
        #ghostNote {
            text-align: center; font-family: 'Rajdhani', sans-serif; font-weight: 700;
            font-size: 11px; margin-top: 3px; color: #64748b; opacity: 0.85;
        }
        #magnetIndicator {
            text-align: center; font-family: 'Rajdhani', sans-serif; font-weight: 900;
            font-size: 15px; margin-top: 6px; color: #fff; background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: 2px solid #000; border-radius: 100px; padding: 4px 10px; display: inline-block;
            position: relative; left: 50%; transform: translateX(-50%);
            animation: magnetPulse 0.6s ease-in-out infinite alternate;
        }
        @keyframes magnetPulse { 0% { transform: translateX(-50%) scale(1); } 100% { transform: translateX(-50%) scale(1.08); } }
        #levelIntroBanner {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            z-index: 26; pointer-events: none; text-align: center;
            animation: levelIntroPop 1.8s ease-out forwards;
        }
        #levelIntroNum {
            font-family: 'Rajdhani', sans-serif; font-weight: 900; font-size: 22px; letter-spacing: 3px;
            color: var(--text-secondary); text-shadow: 1px 1px 0 #fff;
        }
        #levelIntroName {
            font-family: 'Rajdhani', sans-serif; font-weight: 900; font-size: 42px; letter-spacing: 1px;
            color: var(--text-primary); text-shadow: 3px 3px 0px #000, -1px -1px 0 #fff;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        @keyframes levelIntroPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
            25% { transform: translate(-50%, -50%) scale(1); }
            75% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
        #hitFlashOverlay {
            position: absolute; inset: 0; z-index: 25; pointer-events: none;
            background: radial-gradient(circle, transparent 40%, rgba(239,68,68,0.5) 100%);
            opacity: 0; transition: opacity 0.15s ease;
        }
        #hitFlashOverlay.show { opacity: 1; }

        #pauseBtn {
            position: absolute; top: 50%; left: 12px;
            transform: translateY(-50%);
            z-index: 35;
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            background: #fff; cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #pauseBtn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #pauseBtn svg { width: 24px; height: 24px; color: var(--text-primary); }

        #threeCanvas { position: absolute; inset: 0; z-index: 1; touch-action: none; }

        #speedLines {
            position: absolute; inset: 0; z-index: 15; pointer-events: none; opacity: 0;
            background: repeating-conic-gradient(from 0deg, transparent 0deg, transparent 8deg, rgba(255,255,255,0.8) 9deg, rgba(0,0,0,0.9) 10deg, rgba(255,255,255,0.8) 11deg, transparent 12deg);
            mask-image: radial-gradient(circle, transparent 40%, black 80%);
            -webkit-mask-image: radial-gradient(circle, transparent 40%, black 80%);
            transition: opacity 0.2s ease-out; animation: speedRotate 0.5s linear infinite;
        }
        @keyframes speedRotate { from { transform: rotate(0deg) scale(1.2); } to { transform: rotate(360deg) scale(1.2); } }

        .modal {
            position: absolute; inset: 0; z-index: 50;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(6px);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-card {
            width: 90%; max-width: 340px; padding: 24px 20px;
            display: flex; flex-direction: column; align-items: center; gap: 16px;
            background: #ffffff; max-height: 85vh; overflow-y: auto;
        }
        .modal-title { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 900; text-align: center; color: var(--text-primary); }

        .btn {
            width: 100%; padding: 14px; border: 2.5px solid var(--border); border-radius: 12px;
            font-family: 'Rajdhani', sans-serif; font-weight: 800; font-size: 18px;
            cursor: pointer; transition: transform 0.1s ease;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 4px 4px 0px var(--border);
        }
        .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--border); }
        .btn-primary { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); color: #fff; }
        .btn-gold { background: linear-gradient(135deg, var(--accent-gold), #f97316); color: #000; }
        .btn-ghost { background: #f1f5f9; color: var(--text-primary); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .grid-1 { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; }

        .item-card {
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            padding: 14px 10px; background: linear-gradient(160deg, #ffffff, #f1f5f9);
            border: 2.5px solid var(--border);
            border-radius: 14px; cursor: pointer; box-shadow: 3px 3px 0px var(--border);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .item-card:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px var(--border); }
        .item-card.equipped {
            border-color: var(--accent-green);
            background: linear-gradient(160deg, #d1fae5, #a7f3d0);
            box-shadow: 3px 3px 0px var(--border), 0 0 16px rgba(16,185,129,0.5);
        }
        .item-card.locked { opacity: 0.75; }
        .item-card.legendary { background: linear-gradient(160deg, #fef3c7, #fde68a); }
        .item-card.legendary::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.85) 50%, transparent 70%);
            background-size: 200% 200%; animation: shimmer 2.2s linear infinite; pointer-events: none;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .rarity-badge {
            position: absolute; top: 4px; right: 4px; font-size: 8px; font-weight: 800;
            font-family: 'Rajdhani', sans-serif; padding: 2px 6px; border-radius: 6px;
            border: 1.5px solid var(--border); letter-spacing: 0.5px; z-index: 2;
        }
        .rarity-common { background: #e2e8f0; color: #475569; }
        .rarity-rare { background: #bfdbfe; color: #1e40af; }
        .rarity-epic { background: #ddd6fe; color: #5b21b6; }
        .rarity-legendary { background: linear-gradient(90deg, #fde047, #fb923c); color: #7c2d12; }

        .item-preview {
            width: 52px; height: 52px; border-radius: 50%;
            border: 2px solid var(--border);
            box-shadow:
                inset -6px -8px 12px rgba(0,0,0,0.35),
                inset 6px 8px 10px rgba(255,255,255,0.5),
                3px 4px 0px rgba(0,0,0,0.3),
                0 0 14px var(--skin-glow, transparent);
            position: relative; z-index: 1;
            animation: floatPreview 3s ease-in-out infinite;
        }
        @keyframes floatPreview { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-3px) rotate(6deg); } }
        .item-card.equipped .item-preview { animation: floatPreview 3s ease-in-out infinite, pulseGlow 1.4s ease-in-out infinite; }
        @keyframes pulseGlow { 0%, 100% { box-shadow: inset -6px -8px 12px rgba(0,0,0,0.35), inset 6px 8px 10px rgba(255,255,255,0.5), 3px 4px 0px rgba(0,0,0,0.3), 0 0 10px var(--skin-glow, transparent); } 50% { box-shadow: inset -6px -8px 12px rgba(0,0,0,0.35), inset 6px 8px 10px rgba(255,255,255,0.5), 3px 4px 0px rgba(0,0,0,0.3), 0 0 22px var(--skin-glow, transparent); } }

        .item-name { font-family: 'Rajdhani', sans-serif; font-weight: 800; font-size: 16px; }
        .item-cost { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 4px; }

        .toast {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%); z-index: 100;
            font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 14px;
            padding: 10px 20px; border-radius: 100px; background: #fff;
            border: 2.5px solid var(--border); box-shadow: 4px 4px 0px var(--border);
            animation: toastAnim 2s ease forwards;
        }
        @keyframes toastAnim { 0% { opacity: 0; transform: translateX(-50%) translateY(-20px); } 10% { opacity: 1; transform: translateX(-50%) translateY(0); } 80% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

        .combo-text {
            position: absolute; font-family: 'Rajdhani', sans-serif; font-size: 40px; font-weight: 900;
            color: var(--accent-gold); text-shadow: 2px 2px 0px #000, -1px -1px 0 #fff;
            pointer-events: none; z-index: 25; animation: comboFloat 1s ease-out forwards;
        }
        @keyframes comboFloat { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-60px) scale(1.4); opacity: 0; } }
    </style>
</head>
<body>
    <div id="app">
        <div id="debugOverlay" style="position:absolute; inset:0; z-index:9999; background:#fff; color:#b91c1c; font-family:monospace; font-size:13px; padding:16px; overflow:auto; display:none; white-space:pre-wrap;"></div>
        <div id="topBar">
            <div class="top-btn cartoony-box" id="settingsBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </div>
            <div class="currency-container">
                <div class="currency-pill cartoony-box">
                    <svg viewBox="0 0 24 24" class="gold-text"><circle cx="12" cy="12" r="9.5" fill="currentColor" stroke="#000" stroke-width="0.5"/><circle cx="12" cy="12" r="7" fill="none" stroke="#fff" stroke-width="1" opacity="0.6"/><text x="12" y="16" font-size="11" font-weight="900" text-anchor="middle" fill="#fff">$</text></svg>
                    <span id="cashDisplay" class="gold-text">0</span>
                </div>
                <div class="currency-pill cartoony-box">
                    <svg viewBox="0 0 24 24" fill="currentColor" class="ruby-text"><path d="M12 2L2 9L12 22L22 9L12 2Z"/></svg>
                    <span id="rubyDisplay" class="ruby-text">0</span>
                </div>
            </div>
        </div>

        <div id="gameHud" class="hidden">
            <div id="progressBar"><div id="progressFill"></div></div>
            <div id="progressLabel">0m / 50m</div>
            <div id="ghostNote" class="hidden">GHOST: racing your best run</div>
            <div id="magnetIndicator" class="hidden">MAGNET x2 COINS!</div>
        </div>
        <div id="levelIntroBanner" class="hidden">
            <div id="levelIntroNum">LEVEL 1</div>
            <div id="levelIntroName">CLASSIC GRID</div>
        </div>
        <div id="hitFlashOverlay"></div>
        <div id="musicToggleBtn" class="top-btn cartoony-box" style="position:absolute; top:12px; left:68px; z-index:31;" title="Music">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        </div>

        <div id="pauseBtn" class="cartoony-box">
            <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
        </div>

        <div id="tapOverlay">
            <div class="tap-instruction" id="tapInstructionText">TUT & BIRAK!</div>
        </div>

        <div id="speedLines"></div>

        <div id="bottomBar">
            <div class="bottom-btn cartoony-box" id="upgradesBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                <span>UPGRADE</span>
            </div>
            <div class="bottom-btn primary cartoony-box" id="playBtn">
                <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <span>PLAY</span>
            </div>
            <div class="bottom-btn cartoony-box" id="skinsBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2 12 5.5 8 2 3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"></path></svg>
                <span>SKINS</span>
            </div>
        </div>


        <canvas id="threeCanvas"></canvas>

        <div id="settingsModal" class="modal hidden">
            <div class="modal-card cartoony-box">
                <h2 class="modal-title">SETTINGS</h2>
                <div class="item-card" id="soundToggleRow" style="width:100%; flex-direction:row; justify-content:space-between; cursor:pointer;">
                    <span class="item-name">SOUND</span>
                    <span class="item-name" id="soundToggleLabel" style="color:var(--accent-green);">ON</span>
                </div>
                <button class="btn btn-ghost" id="closeSettingsBtn">BACK</button>
            </div>
        </div>

        <div id="upgradesModal" class="modal hidden">
            <div class="modal-card cartoony-box">
                <h2 class="modal-title">UPGRADES</h2>
                <div class="grid-1" id="upgradesGrid"></div>
                <button class="btn btn-ghost" id="closeUpgradesBtn">BACK</button>
            </div>
        </div>

        <div id="skinsModal" class="modal hidden">
            <div class="modal-card cartoony-box">
                <h2 class="modal-title">SKIN SHOP</h2>
                <div class="currency-pill cartoony-box" style="margin-bottom: 8px;">
                    <svg viewBox="0 0 24 24" fill="currentColor" class="ruby-text" style="width:20px;height:20px;"><path d="M12 2L2 9L12 22L22 9L12 2Z"/></svg>
                    <span id="shopRubyDisplay" class="ruby-text">0</span>
                </div>
                <div class="grid-2" id="skinsGrid"></div>
                <button class="btn btn-ghost" id="closeSkinsBtn">BACK</button>
            </div>
        </div>

        <div id="pauseModal" class="modal hidden">
            <div class="modal-card cartoony-box">
                <h2 class="modal-title" style="color: var(--accent-cyan);">PAUSED</h2>
                <button class="btn btn-primary" id="resumeBtn">RESUME</button>
                <button class="btn btn-gold" id="replayBtn">REPLAY</button>
                <button class="btn btn-ghost" id="pauseMenuBtn">MENU</button>
            </div>
        </div>

        <div id="winModal" class="modal hidden">
            <div class="modal-card cartoony-box">
                <h2 class="modal-title" style="color: var(--accent-cyan);">STAGE CLEARED!</h2>
                <div id="winPerfectBadge" class="hidden" style="font-family:'Rajdhani',sans-serif; font-weight:900; font-size:14px; color:#fff; background:linear-gradient(135deg,var(--accent-gold),#f59e0b); padding:5px 12px; border-radius:8px; border:2px solid #000; letter-spacing:1px;">PERFECT RUN +50% CASH</div>
                <div id="winRecordBadge" class="hidden" style="font-family:'Rajdhani',sans-serif; font-weight:900; font-size:13px; color:#fff; background:linear-gradient(135deg,#a855f7,#6d28d9); padding:4px 10px; border-radius:8px; border:2px solid #000;">NEW BEST COMBO!</div>
                <div style="font-family: 'Rajdhani'; font-size: 48px; font-weight: 900; color: var(--accent-gold);" id="winCash">+0</div>
                <div style="display:flex; gap:8px; font-weight:800; color: var(--accent-ruby);" id="winRuby">+0</div>
                <div class="grid-2" style="margin: 8px 0;">

    <script>
        // ============================================================
        // ON-SCREEN DEBUG
        // ============================================================
        function showDebugError(msg) {
            const el = document.getElementById('debugOverlay');
            el.style.display = 'block';
            el.textContent += msg + '\n\n';
        }
        window.addEventListener('error', (e) => {
            showDebugError('JS ERROR: ' + e.message + '\nAt: ' + (e.filename || 'inline') + ':' + e.lineno);
        });
        window.addEventListener('unhandledrejection', (e) => {
            showDebugError('PROMISE REJECTION: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
        });
        if (typeof THREE === 'undefined') {
            showDebugError('THREE.js failed to load from CDN. Check network access / CSP for cdnjs.cloudflare.com.');
        }

        // ============================================================
        // YANDEX SDK
        // ============================================================
        const YandexSDK = {
            ysdk: null,
            player: null,
            playerData: null,
            initialized: false,

            async init() {
                if (!window.YaGames || !window.YaGames.init) {
                    console.warn('YaGames SDK not found - running in local mode');
                    return false;
                }
                try {
                    this.ysdk = await YaGames.init();
                    this.initialized = true;
                    this.ysdk.features.LoadingAPI?.ready();

                    this.ysdk.on('game_api_pause', () => {
                        AudioEngine.muteAll();
                        if (gameState === 'rolling' || gameState === 'aiming') {
                            pauseGame();
                        }
                    });
                    this.ysdk.on('game_api_resume', () => {
                        AudioEngine.unmuteAll();
                    });

                    try {
                        this.player = await this.ysdk.getPlayer({ signed: false });
                        this.playerData = await this.player.getData();
                        if (this.playerData && this.playerData.kbData_v3) {
                            data = { ...data, ...this.playerData.kbData_v3 };
                            updateUI();
                        }
                    } catch (e) {
                        console.log('Player not authorized or no cloud data');
                    }

                    this.showBanner();
                    console.log('Yandex SDK initialized successfully');
                    return true;
                } catch (e) {
                    console.error('Yandex SDK init failed:', e);
                    return false;
                }
            },

            async showBanner() {
                if (!this.ysdk) return;
                try {
                    await this.ysdk.adv.showBannerAdv();
                } catch (e) {
                    console.log('Banner show failed:', e);
                }
            },
            async hideBanner() {
                if (!this.ysdk) return;
                try {
                    await this.ysdk.adv.hideBannerAdv();
                } catch (e) {
                    console.log('Banner hide failed:', e);
                }
            },
            async getBannerStatus() {
                if (!this.ysdk) return { stickyAdvIsShowing: false };
                try {
                    return await this.ysdk.adv.getBannerAdvStatus();
                } catch (e) {
                    return { stickyAdvIsShowing: false };
                }
            },

            showFullscreen(onClose) {
                if (!this.ysdk) {
                    if (onClose) onClose(false);
                    return;
                }
                AudioEngine.muteAll();
                this.ysdk.adv.showFullscreenAdv({
                    callbacks: {
                        onOpen: () => { console.log('Fullscreen ad opened'); AudioEngine.muteAll(); },
                        onClose: (wasShown) => {
                            console.log('Fullscreen ad closed, wasShown:', wasShown);
                            AudioEngine.unmuteAll();
                            if (onClose) onClose(wasShown);
                        },
                        onError: (err) => {
                            console.error('Fullscreen ad error:', err);
                            AudioEngine.unmuteAll();
                            if (onClose) onClose(false);
                        }
                    }
                });
            },

            showRewarded(onRewarded, onClose) {
                if (!this.ysdk) {
                    if (onRewarded) onRewarded();
                    if (onClose) onClose();
                    return;
                }
                AudioEngine.muteAll();
                let rewardGiven = false;
                this.ysdk.adv.showRewardedVideo({
                    callbacks: {
                        onOpen: () => { console.log('Rewarded video opened'); AudioEngine.muteAll(); },
                        onRewarded: () => {
                            console.log('User rewarded');
                            rewardGiven = true;
                            if (onRewarded) onRewarded();
                        },
                        onClose: (wasShown) => {
                            console.log('Rewarded video closed, wasShown:', wasShown);
                            AudioEngine.unmuteAll();
                            if (onClose) onClose(wasShown, rewardGiven);
                        },
                        onError: (err) => {
                            console.error('Rewarded video error:', err);
                            AudioEngine.unmuteAll();
                            if (onClose) onClose(false, false);
                        }
                    }
                });
            },

            async saveToCloud() {
                if (!this.player) return;
                try {
                    await this.player.setData({ kbData_v3: data });
                } catch (e) {
                    console.log('Cloud save failed:', e);
                }
            },

            async setScore(score) {
                if (!this.ysdk) return;
                try {
                    const lb = await this.ysdk.getLeaderboards();
                    await lb.setLeaderboardScore('keyboard_ball_highscore', score);
                } catch (e) {
                    console.log('Leaderboard update failed:', e);
                }
            }
        };

        // ============================================================
        // AUDIO ENGINE
        // ============================================================
        const AudioEngine = {
            ctx: null, enabled: true, lastRollTime: 0, muted: false, masterGain: null,
            init() {
                if (this.ctx) return;
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                this.masterGain = this.ctx.createGain();
                this.masterGain.connect(this.ctx.destination);
                this.masterGain.gain.value = 1;
                this.preloadFiles();
            },
            resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); },
            muteAll() {
                this.muted = true;
                if (this.masterGain) this.masterGain.gain.setValueAtTime(0, this.ctx.currentTime);
                if (this.bgMusic) this.bgMusic.volume = 0;
            },
            unmuteAll() {
                this.muted = false;
                if (this.masterGain) this.masterGain.gain.setValueAtTime(1, this.ctx.currentTime);
                if (this.bgMusic) this.bgMusic.volume = this.musicOn ? 0.35 : 0;
            },

            keyPool: [], keyPoolIdx: 0, winSound: null, loseSound: null, bgMusic: null,
            preloadFiles() {
                if (this.keyPool.length) return;
                for (let i = 0; i < 6; i++) {
                    const a = new Audio('Keyboard.mp3'); a.preload = 'auto'; a.volume = 0.7;
                    this.keyPool.push(a);
                }
                this.winSound = new Audio('Win.mp3'); this.winSound.preload = 'auto'; this.winSound.volume = 0.8;
                this.loseSound = new Audio('Lose.mp3'); this.loseSound.preload = 'auto'; this.loseSound.volume = 0.7;
                this.bgMusic = new Audio('Background.mp3'); this.bgMusic.preload = 'auto'; this.bgMusic.loop = true; this.bgMusic.volume = this.musicOn ? 0.35 : 0;
            },
            playKeyThock(panX = 0) {
                if (!this.enabled || this.muted || !this.keyPool.length) return;
                const a = this.keyPool[this.keyPoolIdx];
                this.keyPoolIdx = (this.keyPoolIdx + 1) % this.keyPool.length;
                a.currentTime = 0;
                a.playbackRate = 0.95 + Math.random() * 0.1;
                a.play().catch(() => {});
            },
            playWin() {
                if (!this.enabled || this.muted || !this.winSound) return;
                this.winSound.currentTime = 0; this.winSound.play().catch(() => {});
            },
            playLose() {
                if (!this.enabled || this.muted || !this.loseSound) return;
                this.loseSound.currentTime = 0; this.loseSound.play().catch(() => {});
            },
            playTone(freq, type, dur, vol = 0.3) {
                if (!this.enabled || !this.ctx || this.muted) return; this.resume();
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(vol, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + dur);
                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(t);
                osc.stop(t + dur);
            },
            playUpgrade() { this.playTone(800, 'sine', 0.1, 0.3); setTimeout(() => this.playTone(1200, 'sine', 0.2, 0.3), 100); },
            playError() { this.playTone(180, 'square', 0.15, 0.25); },
            playBump(speed = 0.2) {
                if (!this.enabled || !this.ctx || this.muted) return; this.resume();
                const t = this.ctx.currentTime;
                const freq = 90 + Math.min(speed * 260, 90);
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.6, t + 0.18);
                gain.gain.setValueAtTime(0.001, t);
                gain.gain.exponentialRampToValueAtTime(0.45, t + 0.015);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(t);
                osc.stop(t + 0.2);
            },
            playCoin() {
                this.playTone(988, 'sine', 0.12, 0.3);
                setTimeout(() => this.playTone(1318, 'sine', 0.2, 0.3), 60);
            },
            playMagnet() {
                if (!this.enabled || !this.ctx || this.muted) return; this.resume();
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, t);
                osc.frequency.exponentialRampToValueAtTime(880, t + 0.35);
                gain.gain.setValueAtTime(0.001, t);
                gain.gain.exponentialRampToValueAtTime(0.3, t + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(t);
                osc.stop(t + 0.4);
            },
            musicOn: true,
            startMusic() {
                if (!this.bgMusic) return;
                this.bgMusic.volume = this.muted ? 0 : (this.musicOn ? 0.35 : 0);
                this.bgMusic.play().catch(() => {});
            },
            stopMusic() { if (this.bgMusic) this.bgMusic.pause(); },
            toggleMusic() {
                this.musicOn = !this.musicOn;
                if (this.bgMusic) this.bgMusic.volume = this.muted ? 0 : (this.musicOn ? 0.35 : 0);
                return this.musicOn;
            }
        };

        let data = {
            cash: 0, rubies: 10, currentLevel: 1,
            upgrades: { speed: 1, power: 1, grip: 1 },

        function loadData() {
            const saved = localStorage.getItem('kbData_v3');
            if (saved) { const parsed = JSON.parse(saved); data = { ...data, ...parsed }; }
            updateUI();
        }
        function saveData() {
            localStorage.setItem('kbData_v3', JSON.stringify(data));
            YandexSDK.saveToCloud();
        }
        function getUpgradeCost(level) { return Math.floor(10 * Math.pow(1.15, level - 1)); }

        function updateUI() {
            document.getElementById('cashDisplay').textContent = data.cash;
            document.getElementById('rubyDisplay').textContent = data.rubies;
            document.getElementById('shopRubyDisplay').textContent = data.rubies;
        }

        function setGameUI(active) {
            const topBar = document.getElementById('topBar');

                bottomBar.classList.add('game-active');
                pauseBtn.classList.add('visible');
                YandexSDK.hideBanner();
            } else {

                bottomBar.classList.remove('game-active');

                YandexSDK.showBanner();

        // --- SHOP & UPGRADE ---
        function renderUpgrades() {
            const grid = document.getElementById('upgradesGrid');
            grid.innerHTML = '';
            const upgrades = [
                { key: 'speed', name: 'VELOCITY', icon: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>' },
                { key: 'power', name: 'MOMENTUM', icon: '<path d="M20.5 11H19V7C19 5.9 18.1 5 17 5H13V3.5C13 2.67 12.33 2 11.5 2C10.67 2 10 2.67 10 3.5V5H6C4.9 5 4 5.9 4 7V11H3.5C2.67 11 2 11.67 2 12.5C2 13.33 2.67 14 3.5 14H4V18C4 19.1 4.9 20 6 20H18C19.1 20 20 19.1 20 18V14H20.5C21.33 14 22 13.33 22 12.5C22 11.67 21.33 11 20.5 11Z"></path>' },
                { key: 'grip', name: 'TRACTION', icon: '<circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle>' }
            ];
            upgrades.forEach(u => {
                const lvl = data.upgrades[u.key];
                const cost = getUpgradeCost(lvl);
                const canAfford = data.cash >= cost;
                const div = document.createElement('div');
                div.className = `item-card ${canAfford ? '' : 'locked'}`;
                div.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:24px;height:24px;">${u.icon}</svg>
                    <div class="item-name">${u.name} LVL ${lvl}</div>
                    <div class="item-cost" style="color:var(--accent-gold)">${cost} CASH</div>
                `;
                div.addEventListener('click', () => {
                    if (data.cash >= cost) {
                        data.cash -= cost; data.upgrades[u.key]++; saveData(); updateUI(); renderUpgrades();
                        AudioEngine.playUpgrade(); showToast('UPGRADED!');
                    } else { showToast('NOT ENOUGH CASH!'); }
                });
                grid.appendChild(div);
            });
        }

        function getRarity(cost) {
            if (cost === 0) return { key: 'common', label: 'BASIC' };
            if (cost < 200) return { key: 'rare', label: 'RARE' };
            if (cost < 600) return { key: 'epic', label: 'EPIC' };
            return { key: 'legendary', label: 'LEGENDARY' };
        }

        function lightenHex(hex, amt) {
            const r = Math.min(255, ((hex >> 16) & 0xff) + amt);
            const g = Math.min(255, ((hex >> 8) & 0xff) + amt);
            const b = Math.min(255, (hex & 0xff) + amt);
            return `rgb(${r},${g},${b})`;
        }
        function darkenHex(hex, amt) {
            const r = Math.max(0, ((hex >> 16) & 0xff) - amt);
            const g = Math.max(0, ((hex >> 8) & 0xff) - amt);
            const b = Math.max(0, (hex & 0xff) - amt);
            return `rgb(${r},${g},${b})`;
        }

        function renderSkins() {
            const grid = document.getElementById('skinsGrid');
            grid.innerHTML = '';
            skins.forEach(skin => {
                const isUnlocked = data.unlockedSkins.includes(skin.id);
                const isEquipped = data.currentSkin === skin.id;
                const rarity = getRarity(skin.cost);
                const hexStr = '#' + skin.color.toString(16).padStart(6, '0');
                const light = lightenHex(skin.color, 90);
                const dark = darkenHex(skin.color, 60);

                const div = document.createElement('div');
                div.className = `item-card ${isEquipped ? 'equipped' : ''} ${!isUnlocked ? 'locked' : ''} ${rarity.key === 'legendary' ? 'legendary' : ''}`;
                div.innerHTML = `
                    <div class="rarity-badge rarity-${rarity.key}">${rarity.label}</div>
                    <div class="item-preview" style="background: radial-gradient(circle at 32% 28%, ${light}, ${hexStr} 55%, ${dark} 100%); --skin-glow: ${hexStr}; box-shadow: 0 0 18px 4px #${skin.aura.toString(16).padStart(6,'0')}88, 4px 4px 0px rgba(0,0,0,0.9);"></div>
                    <div class="item-name">${skin.name}</div>
                    <div class="item-cost" style="color:var(--accent-ruby)">${isUnlocked ? (isEquipped ? 'EQUIPPED' : 'OWNED') : skin.cost + ' RUBY'}</div>
                `;
                div.addEventListener('click', () => {
                    if (isUnlocked) {
                        data.currentSkin = skin.id; saveData(); renderSkins(); updateBallSkin(); AudioEngine.playUpgrade();
                    } else if (data.rubies >= skin.cost) {
                        data.rubies -= skin.cost; data.unlockedSkins.push(skin.id); data.currentSkin = skin.id;
                        saveData(); updateUI(); renderSkins(); updateBallSkin(); AudioEngine.playWin(); showToast('SKIN UNLOCKED!');
                    } else { showToast('NOT ENOUGH RUBY!'); }
                });
                grid.appendChild(div);
            });
        }

        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
            document.getElementById('app').appendChild(t); setTimeout(() => t.remove(), 2000);
        }

        // ============================================================
        // 3D ENGINE
        // ============================================================
        const canvas = document.getElementById('threeCanvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0xe0f2fe, 40, 120);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;

        let obstacles = [], ghostMesh = null, ghostFrames = [], ghostFrameIdx = 0, ghostActive = false;

        // ============================================================
        // LEVEL THEMES & SPAWNING (BALANCED & EASIER)

        const levelThemePool = [
            { name: 'CLASSIC GRID', minLevel: 1 },
            { name: 'ZIGZAG PATH', minLevel: 1 },
            { name: 'COIN RUSH', minLevel: 1 },
            { name: 'WIDE HIGHWAY', minLevel: 1 },
            { name: 'OBSTACLE GAUNTLET', minLevel: 8 },
            { name: 'NARROW SPRINT', minLevel: 15 },
            { name: 'DOUBLE ZIGZAG', minLevel: 40 },

        let currentTheme = levelThemePool[0];
        let currentRewardMult = 1;

        function getTier(level) { return Math.min(19, Math.floor((level - 1) / 50)); }

        function pickThemeForLevel(level) {
            if (level % 100 === 0) return { name: 'BOSS RUN' };
            if (level % 50 === 0) return { name: 'CHECKPOINT' };
            const unlocked = levelThemePool.filter(t => level >= t.minLevel);
            const tier = getTier(level);
            const idx = (level * 7 + tier * 3) % unlocked.length;
            return unlocked[idx];
        }

        function spawnLevel() {
            keyboardKeys.forEach(k => scene.remove(k.mesh)); keyboardKeys = [];
            obstacles.forEach(o => scene.remove(o.mesh)); obstacles = [];
            if (ghostMesh) { scene.remove(ghostMesh); ghostMesh = null; }
            keysHit = 0; combo = 0; maxCombo = 0; totalKeysSpawned = 0;

            currentTheme = pickThemeForLevel(data.currentLevel);
            const theme = currentTheme.name;
            const tier = getTier(data.currentLevel);
            currentRewardMult = 1;

            // *** ZORLUK KOLAYLAŞTIRMA ***
            const distance = Math.min(30 + (data.currentLevel * 0.8), 100); // eskiden 50 + level*1.5
            finishGroup.position.z = -distance;

            let cols = Math.min(10, 6 + Math.floor(data.currentLevel / 30)); // daha az sütun
            let spacing = Math.max(1.2, 1.6 - (data.currentLevel * 0.002)); // daha geniş
            let keyFillChance = 0.35; // sabit, daha yüksek
            let bonusChance = 0.08; // daha sık bonus
            let obstacleMult = 1;
            let zigzag = false, zigzagAmplitude = 0, zigzagSpeed = 0, doubleZigzag = false;
            const obstacleCap = Math.min(20, 10 + tier); // daha az engel

            // Tema özel ayarlar (yumuşatılmış)
            if (theme === 'ZIGZAG PATH') {
                cols = Math.max(5, cols - 2);
                zigzag = true; zigzagAmplitude = 2.2; zigzagSpeed = 0.3;
                keyFillChance = 0.45; obstacleMult = 0.5;
            } else if (theme === 'COIN RUSH') {
                keyFillChance = 0.30; bonusChance = 0.18; obstacleMult = 0.3;
            } else if (theme === 'OBSTACLE GAUNTLET') {
                keyFillChance = 0.30; obstacleMult = 1.2;
            } else if (theme === 'WIDE HIGHWAY') {
                cols = 10; spacing = spacing * 1.1; keyFillChance = 0.30; obstacleMult = 0.4;
            } else if (theme === 'NARROW SPRINT') {
                cols = Math.max(4, Math.min(6, cols - 3)); keyFillChance = 0.45; obstacleMult = 0.6;
            } else if (theme === 'DOUBLE ZIGZAG') {
                zigzag = true; doubleZigzag = true; zigzagAmplitude = 2.8; zigzagSpeed = 0.4;
                keyFillChance = 0.40; obstacleMult = 0.8;
            } else if (theme === 'SPEED ZONE') {
                spacing = Math.max(1.0, spacing * 0.9); keyFillChance = 0.35; obstacleMult = 0.6;
            } else if (theme === 'MINEFIELD') {
                keyFillChance = 0.25; bonusChance = 0.10; obstacleMult = 1.5;
            } else if (theme === 'GOLDEN GAUNTLET') {
                keyFillChance = 0.30; bonusChance = 0.20; obstacleMult = 1.2;
            } else if (theme === 'CHECKPOINT') {
                cols = 10; keyFillChance = 0.35; bonusChance = 0.25; obstacleMult = 0.2;
                currentRewardMult = 1.5;
            } else if (theme === 'BOSS RUN') {
                cols = Math.max(5, Math.min(7, cols - 2));
                zigzag = true; zigzagAmplitude = 2.6; zigzagSpeed = 0.35;
                keyFillChance = 0.40; bonusChance = 0.12; obstacleMult = 1.6;
                currentRewardMult = 3;
            }

            const colors = ['#67e8f9', '#f9a8d4', '#fcd34d', '#c4b5fd', '#6ee7b7'];
            const startX = -((cols - 1) * spacing) / 2;

            for (let row = 0; row < Math.ceil(distance / spacing) + 10; row++) {
                const z = -4 - (row * spacing); if (z < -distance - 5) continue;

                const pathCenterCol = zigzag ? (cols - 1) / 2 + Math.sin(row * zigzagSpeed) * zigzagAmplitude : null;
                const pathCenterCol2 = doubleZigzag ? (cols - 1) / 2 - Math.sin(row * zigzagSpeed) * zigzagAmplitude : null;

                for (let col = 0; col < cols; col++) {
                    let x = startX + (col * spacing);
                    if (zigzag) {
                        const nearLane1 = Math.abs(col - pathCenterCol) <= 1.5;
                        const nearLane2 = doubleZigzag && Math.abs(col - pathCenterCol2) <= 1.5;
                        if (!nearLane1 && !nearLane2) continue;
                    }
                    if (Math.random() > keyFillChance) continue;

                    if (Math.random() < bonusChance) {
                        const mesh = createBonusKeyMesh();
                        mesh.position.set(x, 0, z); scene.add(mesh);
                        keyboardKeys.push({ mesh, topMesh: mesh.userData.coinMesh, baseY: 0.5, pressed: false, pressTime: 0, color: '#fbbf24', bonus: true, isCoin: true });
                        totalKeysSpawned++;
                        continue;
                    }

                    const color = colors[(row + col) % colors.length];
                    const letter = kbLayout[row % 4][col % 10];
                    const mesh = createKeyMesh(letter, color);
                    mesh.position.set(x, 0, z); scene.add(mesh);
                    keyboardKeys.push({ mesh, topMesh: mesh.children[1], baseY: 0, pressed: false, pressTime: 0, color });
                    totalKeysSpawned++;
                }
            }

            // Engeller (daha az)
            const obstacleCount = Math.round(Math.min(obstacleCap, 2 + Math.floor(data.currentLevel / 6)) * obstacleMult);
            for (let i = 0; i < obstacleCount; i++) {
                const z = -10 - Math.random() * (distance - 14);
                let x;
                if (zigzag) {
                    const rowGuess = Math.abs((z + 4) / spacing);
                    const centerGuess = (cols - 1) / 2 + Math.sin(rowGuess * zigzagSpeed) * zigzagAmplitude;
                    const side = Math.random() > 0.5 ? 1 : -1;
                    x = startX + Math.max(0, Math.min(cols - 1, centerGuess + side * (2 + Math.random() * 1.5))) * spacing;
                } else {
                    x = startX + Math.random() * ((cols - 1) * spacing);
                }
                const mesh = createObstacleMesh();
                mesh.position.set(x, 0.5, z);
                scene.add(mesh);
                obstacles.push({ mesh, hit: false });
            }

            // Ghost
            runFrames = [];
            ghostFrames = (data.levelGhost && data.levelGhost.level === data.currentLevel) ? data.levelGhost.frames : [];
            ghostFrameIdx = 0;
            ghostActive = ghostFrames.length > 0;
            if (ghostActive) {
                ghostMesh = createGhostMesh();
                ghostMesh.position.set(0, 0.8, 0);
                scene.add(ghostMesh);
            }
            document.getElementById('ghostNote').classList.toggle('hidden', !ghostActive);

            return distance;
        }

            document.getElementById('pauseModal').classList.add('hidden');
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressLabel').textContent = `0m / ${finishDist}m`;
            setGameUI(true);

            const banner = document.getElementById('levelIntroBanner');
            document.getElementById('levelIntroNum').textContent = 'LEVEL ' + data.currentLevel;
            document.getElementById('levelIntroName').textContent = currentTheme.name;
            banner.classList.remove('hidden');
            banner.style.animation = 'none';
            void banner.offsetWidth;
            banner.style.animation = '';
        }

        function pauseGame() {
            if (gameState !== 'rolling' && gameState !== 'aiming') return;
            isPaused = true;
            isDragging = false;
            document.getElementById('pauseModal').classList.remove('hidden');
        }

        function resumeGame() {
            isPaused = false;
            document.getElementById('pauseModal').classList.add('hidden');
        }

        function goToMenu() {
            gameState = 'menu';
            isPaused = false;
            isDragging = false;
            resetBall();
            document.getElementById('gameHud').classList.add('hidden');
            document.getElementById('tapOverlay').classList.add('hidden');
            document.getElementById('winModal').classList.add('hidden');
            document.getElementById('loseModal').classList.add('hidden');
            document.getElementById('pauseModal').classList.add('hidden');
            setGameUI(false);
            camera.position.set(0, 5, 9);
            camera.lookAt(0, 0, -5);
        }

        // ============================================================
        // INPUT HANDLING
        // ============================================================
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        let isSteering = false, steerLastX = 0;

        function onDown(e) {
            if (isPaused) return;
            if (gameState === 'rolling' && !isEnding) {
                if (e.cancelable) e.preventDefault();
                isSteering = true; steerLastX = getPointerPos(e).x;
                return;
            }
            if (gameState !== 'aiming' || isEnding) return;
            if (e.cancelable) e.preventDefault();
            AudioEngine.init(); AudioEngine.resume(); AudioEngine.startMusic();
            isDragging = true; dragStart = getPointerPos(e); dragCurrent = dragStart;
            holdStartTime = Date.now();
            document.getElementById('tapOverlay').classList.add('hidden');
        }
        function onMove(e) {
            if (isPaused) return;
            if (isSteering && gameState === 'rolling' && !isEnding) {
                if (e.cancelable) e.preventDefault();
                const x = getPointerPos(e).x;
                const dx = x - steerLastX; steerLastX = x;
                ballVel.x += dx * 0.00045;
                ballVel.x = Math.max(-0.5, Math.min(0.5, ballVel.x));
                return;
            }
            if (!isDragging || gameState !== 'aiming') return;
            if (e.cancelable) e.preventDefault(); dragCurrent = getPointerPos(e);
            ball.position.x = (dragCurrent.x - dragStart.x) * 0.01;

            const heldMs = Date.now() - holdStartTime;
            const chargeRatio = Math.min(heldMs, MAX_HOLD_MS) / MAX_HOLD_MS;
            ball.scale.set(1 + chargeRatio * 0.15, 1 - chargeRatio * 0.12, 1 + chargeRatio * 0.15);
        }
        function onUp(e) {
            if (isSteering) { isSteering = false; return; }
            if (!isDragging || gameState !== 'aiming' || isPaused) return;
            isDragging = false;
            const holdDuration = Date.now() - holdStartTime;
            const end = dragCurrent || dragStart;
            const dx = end.x - dragStart.x;

            ball.scale.set(1, 1, 1);

            if (holdDuration < MIN_HOLD_MS) {
                showToast('TUTARAK BIRAK!');
                AudioEngine.init(); AudioEngine.resume(); AudioEngine.playError();
                gameState = 'aiming';
                document.getElementById('tapInstructionText').textContent = 'TUT & BIRAK!';
                document.getElementById('tapOverlay').classList.remove('hidden');
                return;
            }

            const p = getParams();
            const chargeRatio = Math.min(holdDuration, MAX_HOLD_MS) / MAX_HOLD_MS;
            const speed = p.maxSpeed * (0.35 + chargeRatio * 0.65);
            const steerAngle = Math.max(-0.6, Math.min(0.6, dx * 0.003));

            ballVel.x = Math.sin(steerAngle) * speed * 0.6;
            ballVel.z = -Math.cos(steerAngle) * speed;
            gameState = 'rolling'; startTime = Date.now();
            bounceTime = 0;
        }

        canvas.addEventListener('touchstart', onDown, { passive: false });
        canvas.addEventListener('touchmove', onMove, { passive: false });
        canvas.addEventListener('touchend', onUp, { passive: false });
        canvas.addEventListener('touchcancel', onUp, { passive: false });
        canvas.addEventListener('mousedown', onDown);
        canvas.addEventListener('mousemove', onMove);
        canvas.addEventListener('mouseup', onUp);

        // ============================================================
        // GAME LOOP
        // ============================================================
        let lastTime = 0;
        function update(timestamp) {
            if (lastTime === 0) lastTime = timestamp;
            const delta = timestamp - lastTime; lastTime = timestamp;

            grassBlades.forEach(gb => {
                gb.mesh.rotation.z = gb.baseRot + Math.sin(timestamp * 0.002 * gb.speed) * 0.1;
            });
            updateSkinParticles();

            if (isPaused) return;

            if (gameState === 'rolling' && !isEnding) {
                const p = getParams();

                const curSpeed = Math.sqrt(ballVel.x ** 2 + ballVel.z ** 2);
                autoWigglePhase += delta * 0.0032 * (1 + curSpeed * 1.6);
                ballVel.x += Math.sin(autoWigglePhase) * 0.0016 * (0.4 + curSpeed);

                ball.position.x += ballVel.x; ball.position.z += ballVel.z;
                const speed = Math.sqrt(ballVel.x ** 2 + ballVel.z ** 2);

                bounceTime += delta * 0.008 * (speed * 10 + 2);
                const bouncePhase = Math.sin(bounceTime);
                const bounceHeight = Math.max(0, bouncePhase) * Math.min(speed * 1.2, 0.2);
                ball.position.y = 0.8 + bounceHeight;

                ball.rotation.x += ballVel.z * 1.5;
                ball.rotation.z -= ballVel.x * 1.5;
                if (speed > maxSpeed) maxSpeed = speed;
                ballVel.x *= p.friction; ballVel.z *= p.friction;

                document.getElementById('speedLines').style.opacity = speed > 0.3 ? Math.min((speed - 0.3) * 2.5, 0.9) : '0';

                if (speed > 0.05) {
                    dropTimer += delta;
                    if (dropTimer > 60) {
                        dropTimer = 0;
                        const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), new THREE.MeshBasicMaterial({ color: 0x06b6d4, transparent: true, opacity: 0.8 }));
                        mesh.position.set(ball.position.x + (Math.random() - 0.5) * 0.2, 0.1, ball.position.z + 0.5);
                        scene.add(mesh); drops.push({ mesh, life: 1.0 });
                    }
                    if (Math.random() < 0.6) spawnSkinParticle();
                }

                if (speed < 0.012) {
                    isEnding = true;
                    setTimeout(() => Math.abs(ball.position.z) >= finishDist - 2 ? winLevel() : loseLevel(), 100);
                }

                if (Math.abs(ball.position.x) > 14) { ball.position.x = Math.sign(ball.position.x) * 14; ballVel.x *= -0.75; AudioEngine.playBump(Math.abs(ballVel.x)); }

                if (timestamp % 2 < 1) runFrames.push({ x: ball.position.x, z: ball.position.z });

                if (ghostActive && ghostFrames.length) {
                    if (ghostFrameIdx < ghostFrames.length) {
                        const gf = ghostFrames[ghostFrameIdx];
                        ghostMesh.position.x += (gf.x - ghostMesh.position.x) * 0.4;
                        ghostMesh.position.z += (gf.z - ghostMesh.position.z) * 0.4;
                        ghostFrameIdx++;
                    } else {
                        ghostMesh.material.opacity = Math.max(0, ghostMesh.material.opacity - 0.02);
                    }
                }

                keyboardKeys.forEach(kk => {
                    if (kk.isCoin && !kk.pressed) {
                        kk.mesh.rotation.y += 0.06;
                        kk.mesh.userData.glow.scale.setScalar(1 + Math.sin(timestamp * 0.005) * 0.15);
                        if (magnetActive) {
                            const dx = ball.position.x - kk.mesh.position.x, dz = ball.position.z - kk.mesh.position.z;
                            const md = Math.sqrt(dx * dx + dz * dz);
                            if (md < 6 && md > 0.1) { kk.mesh.position.x += (dx / md) * 0.25; kk.mesh.position.z += (dz / md) * 0.25; }
                        }
                    }
                    const dist = Math.sqrt((ball.position.x - kk.mesh.position.x) ** 2 + (ball.position.z - kk.mesh.position.z) ** 2);
                    if (dist < 0.95 && !kk.pressed) {
                        kk.pressed = true; kk.pressTime = timestamp; keysHit++;
                        const now = Date.now();
                        if (kk.bonus) {
                            const gain = 25 * (magnetActive ? 2 : 1);
                            bonusCash += gain; combo += 2; if (combo > maxCombo) maxCombo = combo;
                            AudioEngine.playCoin();
                            const el = document.createElement('div'); el.className = 'combo-text'; el.textContent = 'GOLD +' + gain + '!';
                            el.style.color = '#f59e0b';
                            el.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 100) + 'px';
                            el.style.top = (window.innerHeight / 2 - 130) + 'px';
                            document.getElementById('app').appendChild(el); setTimeout(() => el.remove(), 1000);
                        } else if (now - lastKeyTime < 500) {
                            combo++; if (combo > maxCombo) maxCombo = combo;
                            if (combo >= 3) {
                                AudioEngine.playTone(600 + combo * 50, 'sine', 0.15, 0.2);
                                const el = document.createElement('div'); el.className = 'combo-text'; el.textContent = combo + 'x COMBO!';
                                el.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 100) + 'px';
                                el.style.top = (window.innerHeight / 2 - 100) + 'px';
                                document.getElementById('app').appendChild(el); setTimeout(() => el.remove(), 1000);
                            }
                            if (combo > 0 && combo % 10 === 0) triggerMagnet();
                        } else { combo = 1; }
                        lastKeyTime = now;
                        if (!kk.isCoin) { AudioEngine.playKeyThock(kk.mesh.position.x); kk.topMesh.position.y = 0.05; } else { kk.mesh.scale.setScalar(1.4); kk.mesh.visible = false; }
                    }
                    if (kk.pressed && timestamp - kk.pressTime > 100) kk.pressed = false;
                    if (!kk.isCoin) kk.topMesh.position.y += (kk.pressed ? 0.05 : 0.15 - kk.topMesh.position.y) * 0.5;
                });

                if (magnetActive) { magnetTimer--; if (magnetTimer <= 0) magnetActive = false; }
                document.getElementById('magnetIndicator') && document.getElementById('magnetIndicator').classList.toggle('hidden', !magnetActive);

                obstacles.forEach(ob => {
                    ob.mesh.rotation.x += ob.mesh.userData.spin; ob.mesh.rotation.y += ob.mesh.userData.spin;
                    if (ob.hit) return;
                    const dx = ball.position.x - ob.mesh.position.x, dz = ball.position.z - ob.mesh.position.z;
                    const d = Math.sqrt(dx * dx + dz * dz);
                    if (d < 0.85) {
                        ob.hit = true;
                        const nx = d > 0.001 ? dx / d : 1, nz = d > 0.001 ? dz / d : 0;
                        const dot = ballVel.x * nx + ballVel.z * nz;
                        const restitution = 0.8;
                        ballVel.x = (ballVel.x - 2 * dot * nx) * restitution;
                        ballVel.z = (ballVel.z - 2 * dot * nz) * restitution;
                        combo = 0;
                        AudioEngine.playBump(Math.sqrt(ballVel.x ** 2 + ballVel.z ** 2));
                        hitFlashTimer = 10;
                        screenShake = 0.22;
                        document.getElementById('hitFlashOverlay').classList.add('show');
                        ob.mesh.children[0] && (ob.mesh.children[0].material.color.setHex(0x991b1b));
                    }
                });
                if (hitFlashTimer > 0) { hitFlashTimer--; if (hitFlashTimer === 0) document.getElementById('hitFlashOverlay').classList.remove('show'); }

                for (let i = drops.length - 1; i >= 0; i--) {
                    const d = drops[i]; d.life -= 0.025; d.mesh.scale.setScalar(d.life); d.mesh.material.opacity = d.life; d.mesh.position.y -= 0.015;
                    if (d.life <= 0) { scene.remove(d.mesh); d.mesh.geometry.dispose(); d.mesh.material.dispose(); drops.splice(i, 1); }
                }

                camera.position.x += (ball.position.x * 0.4 - camera.position.x) * 0.1;
                camera.position.z = ball.position.z + 9;
                camera.position.y = 5 + (speed * 2);
                if (screenShake > 0) {
                    camera.position.x += (Math.random() - 0.5) * screenShake;
                    camera.position.y += (Math.random() - 0.5) * screenShake;
                    screenShake *= 0.85; if (screenShake < 0.01) screenShake = 0;
                }
                camera.lookAt(ball.position.x, 0, ball.position.z - 5);
                camera.fov = 60 + (speed * 15); camera.updateProjectionMatrix();

                const currentDist = Math.min(Math.abs(ball.position.z), finishDist);
                document.getElementById('progressFill').style.width = ((currentDist / finishDist) * 100) + '%';
                document.getElementById('progressLabel').textContent = `${Math.floor(currentDist)}m / ${finishDist}m`;

                if (ball.position.z <= -finishDist + 2 && !isEnding) { isEnding = true; setTimeout(winLevel, 100); }
            }
        }

        function draw() { renderer.render(scene, camera); }
        function gameLoop(timestamp) { update(timestamp); draw(); requestAnimationFrame(gameLoop); }

        function saveRunGhost(finalDist) {
            if (!data.levelGhost || data.levelGhost.level !== data.currentLevel || finalDist > data.levelGhost.dist) {
                data.levelGhost = { level: data.currentLevel, dist: finalDist, frames: runFrames.slice(0, 4000) };
            }
        }

        function winLevel() {
            gameState = 'won'; AudioEngine.playWin();
            const isPerfect = totalKeysSpawned > 0 && keysHit >= totalKeysSpawned;
            let cashReward = (data.currentLevel * 12) + (maxCombo * 4) + (keysHit * 2) + bonusCash;
            cashReward = Math.floor(cashReward * currentRewardMult);
            if (isPerfect) cashReward = Math.floor(cashReward * 1.5);
            const rubyReward = Math.floor(Math.random() * 8) + 1;

            const isNewCombo = maxCombo > data.bestCombo;
            const finalDist = Math.abs(ball.position.z);
            if (finalDist > data.bestDistance) data.bestDistance = finalDist;
            if (isNewCombo) data.bestCombo = maxCombo;
            if (isPerfect) data.perfectRuns = (data.perfectRuns || 0) + 1;
            saveRunGhost(finalDist);

            data.cash += cashReward; data.rubies += rubyReward; data.currentLevel++;
            saveData(); updateUI();

            document.getElementById('winCash').textContent = `+${cashReward} CASH`;
            document.getElementById('winRuby').textContent = `+${rubyReward} RUBY`;
            document.getElementById('winKeys').textContent = keysHit;
            document.getElementById('winCombo').textContent = maxCombo;
            document.getElementById('winPerfectBadge').classList.toggle('hidden', !isPerfect);
            document.getElementById('winRecordBadge').classList.toggle('hidden', !isNewCombo);
            document.getElementById('winModal').classList.remove('hidden');
            setGameUI(false);

            YandexSDK.showFullscreen((wasShown) => {
                console.log('Level complete ad wasShown:', wasShown);
            });
        }

        function loseLevel() {
            gameState = 'lost'; AudioEngine.playLose();
            const currentDist = Math.abs(ball.position.z);
            const pct = Math.min(100, Math.floor((currentDist / finishDist) * 100));
            if (currentDist > data.bestDistance) data.bestDistance = currentDist;
            saveRunGhost(currentDist);
            saveData();
            document.getElementById('losePct').textContent = pct + '%';
            document.getElementById('loseDist').textContent = Math.floor(currentDist) + 'm';
            const ghostNote = document.getElementById('loseGhostNote');
            if (ghostActive) {
                const beat = currentDist > (ghostFrames.length ? Math.abs(ghostFrames[ghostFrames.length - 1].z) : 0);
                ghostNote.textContent = beat ? "Bu seviyede önceki rekorunu geçtin!" : "Önceki rekorunu geçmek için tekrar dene!";
            } else {
                ghostNote.textContent = '';
            }
            document.getElementById('loseModal').classList.remove('hidden');
            setGameUI(false);

            YandexSDK.showFullscreen((wasShown) => {
                console.log('Level fail ad wasShown:', wasShown);
            });
        }

        // ============================================================
        // UI BINDINGS
        // ============================================================
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
        });

        document.getElementById('playBtn').addEventListener('click', startLevel);

        document.getElementById('upgradesBtn').addEventListener('click', () => {
            renderUpgrades(); document.getElementById('upgradesModal').classList.remove('hidden');
        });
        document.getElementById('closeUpgradesBtn').addEventListener('click', () => {
            document.getElementById('upgradesModal').classList.add('hidden');
        });

        document.getElementById('skinsBtn').addEventListener('click', () => {
            renderSkins(); document.getElementById('skinsModal').classList.remove('hidden');
        });
        document.getElementById('closeSkinsBtn').addEventListener('click', () => {
            document.getElementById('skinsModal').classList.add('hidden');
        });

        document.getElementById('settingsBtn').addEventListener('click', () => {
            document.getElementById('soundToggleLabel').textContent = AudioEngine.enabled ? 'ON' : 'OFF';
            document.getElementById('soundToggleLabel').style.color = AudioEngine.enabled ? 'var(--accent-green)' : 'var(--accent-ruby)';
            document.getElementById('settingsModal').classList.remove('hidden');
        });
        document.getElementById('closeSettingsBtn').addEventListener('click', () => {
            document.getElementById('settingsModal').classList.add('hidden');
        });
        document.getElementById('soundToggleRow').addEventListener('click', () => {
            AudioEngine.enabled = !AudioEngine.enabled;
            if (AudioEngine.enabled) { AudioEngine.unmuteAll(); AudioEngine.playUpgrade(); } else { AudioEngine.muteAll(); }
            document.getElementById('soundToggleLabel').textContent = AudioEngine.enabled ? 'ON' : 'OFF';
            document.getElementById('soundToggleLabel').style.color = AudioEngine.enabled ? 'var(--accent-green)' : 'var(--accent-ruby)';
        });

        document.getElementById('musicToggleBtn').addEventListener('click', () => {
            AudioEngine.init(); AudioEngine.resume(); AudioEngine.startMusic();
            const on = AudioEngine.toggleMusic();
            document.getElementById('musicToggleBtn').style.opacity = on ? '1' : '0.4';
        });

        document.getElementById('pauseBtn').addEventListener('click', pauseGame);

        document.getElementById('resumeBtn').addEventListener('click', resumeGame);
        document.getElementById('replayBtn').addEventListener('click', () => {
            resumeGame();
            startLevel();
        });
        document.getElementById('pauseMenuBtn').addEventListener('click', goToMenu);

        document.getElementById('nextLevelBtn').addEventListener('click', () => {
            document.getElementById('winModal').classList.add('hidden');
            document.getElementById('gameHud').classList.add('hidden');
            startLevel();
        });
        document.getElementById('winMenuBtn').addEventListener('click', goToMenu);

        document.getElementById('retryBtn').addEventListener('click', () => {
            document.getElementById('loseModal').classList.add('hidden');
            startLevel();
        });
        document.getElementById('loseMenuBtn').addEventListener('click', goToMenu);

        // Rewarded Ads
        document.getElementById('winAdBtn').addEventListener('click', function() {
            const btn = this; btn.textContent = 'LOADING...';
            YandexSDK.showRewarded(
                () => {
                    data.cash += 50; saveData(); updateUI(); showToast('+50 CASH!'); AudioEngine.playUpgrade();
                },
                (wasShown, rewardGiven) => {
                    if (rewardGiven) {
                        btn.textContent = 'REWARD CLAIMED'; btn.disabled = true;
                    } else {
                        btn.textContent = 'WATCH AD +50 CASH';
                        if (!wasShown) showToast('Ad not available');
                    }
                }
            );
        });

        document.getElementById('loseAdBtn').addEventListener('click', function() {
            const btn = this; btn.textContent = 'LOADING...';
            YandexSDK.showRewarded(
                () => {
                    data.cash += 30; saveData(); updateUI(); showToast('+30 CASH!'); AudioEngine.playUpgrade();
                },
                (wasShown, rewardGiven) => {
                    if (rewardGiven) {
                        btn.textContent = 'REWARD CLAIMED'; btn.disabled = true;
                    } else {
                        btn.textContent = 'WATCH AD +30 CASH';
                        if (!wasShown) showToast('Ad not available');
                    }
                }
            );
        });

        // ============================================================
        // INIT
        // ============================================================
        YandexSDK.init().then(() => {
            loadData();
            resetBall();
            spawnLevel();
            gameLoop(0);
        });
    </script>
</body>
</html>
